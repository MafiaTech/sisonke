<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline — Sisonke</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0A2A5A;
            color: #fff;
            font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
            text-align: center;
            padding: 1.5rem;
        }
        .offline-card {
            max-width: 26rem;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: .5rem;
        }
        p {
            color: rgba(255, 255, 255, .78);
            margin-bottom: 1.5rem;
        }
        a {
            display: inline-block;
            padding: .6rem 1.4rem;
            border-radius: .5rem;
            background: #fff;
            color: #0A2A5A;
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="offline-card">
        <h1>You're offline</h1>
        <p>Sisonke can't reach the server right now. Check your connection and try again.</p>
        <a href="/">Retry</a>
    </div>
</body>
</html>
